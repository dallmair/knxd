name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Full history to be able to determine version number

    - name: Install build dependencies
      run: sudo apt-get install -y libusb-1.0-0-dev libsystemd-dev libev-dev libfmt-dev libinih-dev

    - name: Bootstrap
      run: sh bootstrap.sh

    - name: Configure
      run: ./configure

    - name: Build
      run: make

    - name: Run check
      run: make check

    - name: Test install
      run: make install

  crossbuild:

    runs-on: ubuntu-latest
    container: dockcross/linux-mips-uclibc

    steps:
    - uses: actions/checkout@v4

    - name: Bootstrap
      run: sh bootstrap.sh

    - name: Configure
      run: ./configure

    - name: Build
      run: make

    - name: Run check
      run: make check

    - name: Test install
      run: make install
